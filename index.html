<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語学学習サポートAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* カスタムスクロールバー等があればここに */
    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #3498db;
      width: 20px;
      height: 20px;
      -webkit-animation: spin 1s linear infinite; /* Safari */
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

  <!-- ヘッダー -->
  <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold">語学学習サポートAI</h1>
    <a href="<?= sheetUrl ?>" target="_blank" rel="noopener" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-sm font-medium transition duration-200">
      📝 シートを確認
    </a>
  </header>

  <!-- エラーメッセージ表示領域 -->
  <div id="errorMessageContainer" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 m-4 rounded shadow-sm relative">
    <span id="errorMessageText">エラーが発生しました</span>
    <button onclick="closeError()" class="absolute top-2 right-2 text-red-600 hover:text-red-800">&times;</button>
  </div>

  <!-- チャット履歴表示領域 -->
  <main id="chatArea" class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto p-4 flex flex-col gap-4">
    <!-- 初期メッセージ -->
    <div class="flex items-start gap-4">
      <div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">
        こんにちは！語学の表現や意味について質問してください。<br>
        質問に答えながら、自動的にスプレッドシートに例文やニュアンスをメモして保存します。
      </div>
    </div>
  </main>

  <!-- ユーザー入力領域 -->
  <footer class="bg-white p-4 border-t">
    <div class="w-full max-w-4xl mx-auto flex flex-col gap-2">
      <!-- 言語選択プルダウン -->
      <select id="targetLanguage" class="border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 w-48 text-sm text-gray-700 font-medium" onchange="saveLanguage()">
        <option value="自動判定">🌐 自動判定</option>
        <option value="英語">🇬🇧 英語</option>
        <option value="中国語">🇨🇳 中国語</option>
        <option value="韓国語">🇰🇷 韓国語</option>
        <option value="スペイン語">🇪🇸 スペイン語</option>
        <option value="フランス語">🇫🇷 フランス語</option>
        <option value="アラビア語">🇦🇪 アラビア語</option>
      </select>
      <div class="flex gap-1 mb-2 mt-2">
        <button id="micJpBtn" onclick="toggleVoiceRecognition('ja-JP')" class="flex items-center gap-1 bg-gray-100 border hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-medium transition duration-200" title="日本語で質問する">🎤 🇯🇵 日本語で話す</button>
        <button id="micTargetBtn" onclick="toggleVoiceRecognition('target')" class="flex items-center gap-1 bg-gray-100 border hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-medium transition duration-200" title="選んだ言語で話す">🎤 🌐 学習言語で話す</button>
      </div>
      <div class="flex gap-2">
        <textarea id="messageInput" rows="1" class="flex-1 border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden" placeholder="例: 「ありがとう」って何て言うの？" onkeypress="handleKeyPress(event)" onfocus="this.setAttribute('data-original-text', this.value)"></textarea>
        <button id="sendButton" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl shadow-md transition duration-200 flex items-center justify-center min-w-[80px]">
          送信
        </button>
      </div>
    </div>
  </footer>

  <script>
    // ページ読み込み時に設定を復元
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('soliloquy_target_language');
      if (savedLang) {
        document.getElementById('targetLanguage').value = savedLang;
      }
    });

    // プルダウン変更時に設定を保存
    function saveLanguage() {
      const lang = document.getElementById('targetLanguage').value;
      localStorage.setItem('soliloquy_target_language', lang);
    }
    // テキストエリアの高さを自動調整
    const tx = document.getElementById('messageInput');
    tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
    tx.addEventListener("input", OnInput, false);

    function OnInput() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if(this.value === '') {
        this.style.height = 'auto';
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function showError(message) {
      const container = document.getElementById('errorMessageContainer');
      const textNode = document.getElementById('errorMessageText');
      textNode.textContent = message;
      container.classList.remove('hidden');
    }

    function closeError() {
      document.getElementById('errorMessageContainer').classList.add('hidden');
    }

    // 簡単なマークダウンをHTMLに変換（段落と太字程度のサポート）
    function parseMarkdown(text) {
      // 改行を<br>に変換
      let html = text.replace(/\n/g, '<br>');
      // 太字 **text** を <strong>text</strong> に変換
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      return html;
    }

    function appendUserMessage(text) {
      const chatArea = document.getElementById('chatArea');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex items-start gap-4 justify-end';
      const formattedText = parseMarkdown(text);
      msgDiv.innerHTML = `<div class="bg-blue-100 border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">${formattedText}</div>`;
      chatArea.appendChild(msgDiv);
      scrollToBottom();
    }

    function appendAiMessage(text) {
      const chatArea = document.getElementById('chatArea');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex items-start gap-4';
      const formattedText = parseMarkdown(text);
      msgDiv.innerHTML = `<div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">${formattedText}</div>`;
      chatArea.appendChild(msgDiv);
      scrollToBottom();
    }

    function appendLoading() {
      const chatArea = document.getElementById('chatArea');
      const msgDiv = document.createElement('div');
      msgDiv.id = 'loadingIndicator';
      msgDiv.className = 'flex items-start gap-4';
      msgDiv.innerHTML = `<div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 flex items-center gap-2"><div class="loader"></div><span>考え中...</span></div>`;
      chatArea.appendChild(msgDiv);
      scrollToBottom();
    }

    function removeLoading() {
      const loading = document.getElementById('loadingIndicator');
      if (loading) {
        loading.remove();
      }
    }

    function scrollToBottom() {
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      const sendBtn = document.getElementById('sendButton');
      const targetLang = document.getElementById('targetLanguage').value || "自動判定";

      if (!text) return;

      closeError();
      appendUserMessage(text);
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.classList.add('opacity-50');

      appendLoading();

      // バックエンド呼び出し (.withSuccessHandler と .withFailureHandler を必ず実装)
      google.script.run
        .withSuccessHandler(function(response) {
          removeLoading();
          input.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove('opacity-50');
          input.focus();
          
          if (response && response.reply_message) {
            appendAiMessage(response.reply_message);
          } else {
            showError('無効なレスポンスを受け取りました。');
          }
        })
        .withFailureHandler(function(error) {
          removeLoading();
          input.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove('opacity-50');
          
          showError(error.message || '通信エラーが発生しました。');
        })
        .processChat(text, targetLang);
    }

    // --- 音声入力 (Web Speech API) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;
    let currentRecordingLang = '';

    const langCodeMap = {
      "自動判定": "ja-JP",
      "英語": "en-US",
      "中国語": "zh-CN",
      "韓国語": "ko-KR",
      "スペイン語": "es-ES",
      "フランス語": "fr-FR",
      "アラビア語": "ar-SA"
    };

    function initRecognition(langCode) {
      if (!SpeechRecognition) {
        showError('お使いのブラウザは音声入力に対応していません。ChromeやSafariをご利用ください。');
        return;
      }
      
      if (recognition) {
        recognition.stop();
      }

      recognition = new SpeechRecognition();
      recognition.lang = langCode;
      recognition.interimResults = true; 
      recognition.continuous = false;    

      recognition.onstart = function() {
        isRecording = true;
        updateMicUI();
      };

      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }
        
        const tx = document.getElementById('messageInput');
        let orig = tx.getAttribute('data-original-text') || "";
        if (orig && !orig.endsWith(" ") && !orig.endsWith("\n")) {
            orig += " "; // 単語が繋がらないようにスペースを挿入
        }
        
        tx.value = orig + finalTranscript + interimTranscript;
        tx.dispatchEvent(new Event('input')); // 高さを自動調整

        // 確定した部分があれば、それを新しいベース状態とする
        if (finalTranscript) {
             tx.setAttribute('data-original-text', tx.value);
        }
      };

      recognition.onend = function() {
        isRecording = false;
        currentRecordingLang = '';
        updateMicUI();
        document.getElementById('messageInput').setAttribute('data-original-text', document.getElementById('messageInput').value);
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
        if (event.error !== 'no-speech') {
           showError('音声認識でエラーが発生しました: ' + event.error);
        }
        isRecording = false;
        currentRecordingLang = '';
        updateMicUI();
      };
    }

    function toggleVoiceRecognition(mode) {
      if (!SpeechRecognition) {
        showError('お使いのブラウザは音声入力に対応していません。');
        return;
      }

      const tx = document.getElementById('messageInput');

      // すでに録音中なら停止
      if (isRecording) {
        recognition.stop();
        if (currentRecordingLang === mode || currentRecordingLang === 'ja-JP' && mode === 'ja-JP') {
            return; // 同じボタンを押した場合はただの停止処理として終わる
        }
      }

      // レコーディング開始時の元のテキストを保持
      tx.setAttribute('data-original-text', tx.value);

      let targetCode = 'ja-JP';
      if (mode === 'target') {
        const langVal = document.getElementById('targetLanguage').value;
        targetCode = langCodeMap[langVal] || 'ja-JP';
      }

      currentRecordingLang = mode;
      initRecognition(targetCode);
      recognition.start();
    }

    function updateMicUI() {
      const jpBtn = document.getElementById('micJpBtn');
      const targetBtn = document.getElementById('micTargetBtn');
      
      // リセット
      jpBtn.classList.remove('bg-red-100', 'border-red-400', 'text-red-700', 'animate-pulse');
      jpBtn.innerHTML = '🎤 🇯🇵 日本語で話す';
      targetBtn.classList.remove('bg-red-100', 'border-red-400', 'text-red-700', 'animate-pulse');
      targetBtn.innerHTML = '🎤 🌐 学習言語で話す';

      // 録音中のスタイル適用
      if (isRecording) {
          if (currentRecordingLang === 'ja-JP') {
              jpBtn.classList.add('bg-red-100', 'border-red-400', 'text-red-700', 'animate-pulse');
              jpBtn.innerHTML = '🔴 録音中...';
          } else if (currentRecordingLang === 'target') {
              targetBtn.classList.add('bg-red-100', 'border-red-400', 'text-red-700', 'animate-pulse');
              targetBtn.innerHTML = '🔴 録音中...';
          }
      }
    }
  </script>
</body>
</html>
