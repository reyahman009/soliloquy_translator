<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語学学習サポートAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* カスタムスクロールバー */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgba(156, 163, 175, 0.5); /* gray-400 */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(107, 114, 128, 0.8); /* gray-500 */
    }
    
    /* Firefox環境向けスクロールバー設定 */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(156, 163, 175, 0.5) transparent;
    }

    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #3498db;
      width: 20px;
      height: 20px;
      -webkit-animation: spin 1s linear infinite; /* Safari */
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

  <!-- ヘッダー -->
  <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold">語学学習サポートAI</h1>
    <a href="<?= sheetUrl ?>" target="_blank" rel="noopener" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-sm font-medium transition duration-200">
      📝 シートを確認
    </a>
  </header>

  <!-- エラーメッセージ表示領域 -->
  <div id="errorMessageContainer" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 m-4 rounded shadow-sm relative">
    <span id="errorMessageText">エラーが発生しました</span>
    <button onclick="closeError()" class="absolute top-2 right-2 text-red-600 hover:text-red-800">&times;</button>
  </div>

  <!-- チャット履歴表示領域 -->
  <main id="chatArea" class="flex-1 overflow-y-auto w-full">
    <div id="chatContent" class="w-full max-w-4xl mx-auto p-4 flex flex-col gap-4">
      <!-- 初期メッセージ -->
      <div class="flex items-start gap-4">
      <div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">
        こんにちは！語学の表現や意味について質問してください。<br>
        質問に答えながら、自動的にスプレッドシートに例文やニュアンスをメモして保存します。
      </div>
    </div>
    </div>
  </main>

  <!-- ユーザー入力領域 -->
  <footer class="bg-white p-4 border-t">
    <div class="w-full max-w-4xl mx-auto flex flex-col gap-2">
      <!-- 言語選択 & モデル選択 -->
      <div class="flex gap-2 items-center flex-wrap">
        <select id="targetLanguage" class="border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 w-48 text-sm text-gray-700 font-medium" onchange="saveLanguage()">
          <option value="自動判定">自動判定</option>
          <option value="英語">英語</option>
          <option value="中国語">中国語</option>
          <option value="韓国語">韓国語</option>
          <option value="スペイン語">スペイン語</option>
          <option value="フランス語">フランス語</option>
          <option value="アラビア語">アラビア語</option>
        </select>
        <select id="modelSelect" class="border rounded-lg p-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-700 font-medium" onchange="saveModel()">
          <option value="gemini-2.5-flash-lite">🪶 2.5 Flash Lite</option>
          <option value="gemini-2.5-flash">⚡ 2.5 Flash</option>
          <option value="gemini-2.5-pro">💎 2.5 Pro</option>
        </select>
      </div>
      <div class="flex gap-2 items-end">
        <textarea id="messageInput" rows="1" class="flex-1 border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden h-[42px]" placeholder="例: 「ありがとう」って何て言うの？" onkeypress="handleKeyPress(event)"></textarea>
        <button id="sendButton" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl shadow-md transition duration-200 flex items-center justify-center min-w-[80px] h-[42px]">
          送信
        </button>
      </div>
    </div>
  </footer>

  <script>
    // ページ読み込み時に設定を復元
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('soliloquy_target_language');
      if (savedLang) {
        document.getElementById('targetLanguage').value = savedLang;
      }
      const savedModel = localStorage.getItem('soliloquy_model');
      if (savedModel) {
        document.getElementById('modelSelect').value = savedModel;
      }
    });

    // プルダウン変更時に設定を保存
    function saveLanguage() {
      const lang = document.getElementById('targetLanguage').value;
      localStorage.setItem('soliloquy_target_language', lang);
    }
    function saveModel() {
      const model = document.getElementById('modelSelect').value;
      localStorage.setItem('soliloquy_model', model);
    }
    // テキストエリアの高さを自動調整
    const tx = document.getElementById('messageInput');
    tx.setAttribute('style', 'height:42px;overflow-y:hidden;');
    tx.addEventListener("input", OnInput, false);

    function OnInput() {
      this.style.height = '42px';
      this.style.height = Math.max(42, this.scrollHeight) + 'px';
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function showError(message) {
      const container = document.getElementById('errorMessageContainer');
      const textNode = document.getElementById('errorMessageText');
      textNode.innerHTML = message;
      container.classList.remove('hidden');
    }

    function closeError() {
      document.getElementById('errorMessageContainer').classList.add('hidden');
    }

    // 簡単なマークダウンをHTMLに変換（段落と太字程度のサポート）
    function parseMarkdown(text) {
      // 改行を<br>に変換
      let html = text.replace(/\n/g, '<br>');
      // 太字 **text** を <strong>text</strong> に変換
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      return html;
    }

    function appendUserMessage(text) {
      const chatContent = document.getElementById('chatContent');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex items-start gap-4 justify-end';
      const formattedText = parseMarkdown(text);
      msgDiv.innerHTML = `<div class="bg-blue-100 border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">${formattedText}</div>`;
      chatContent.appendChild(msgDiv);
      scrollToBottom();
    }

    function appendAiMessage(responseData) {
      const chatContent = document.getElementById('chatContent');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex items-start gap-4';
      
      const text = typeof responseData === 'string' ? responseData : responseData.reply_message;
      const formattedText = parseMarkdown(text);
      
      let html = `<div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 max-w-[80%]">`;
      html += `<div>${formattedText}</div>`;

      // 🔊 音声読み上げボタンと抽出データの表示ロジック
      if (typeof responseData === 'object' && responseData.phrase && responseData.language) {
          html += `<div class="mt-4 pt-4 border-t border-gray-100 flex flex-col gap-2">`;
          const lang = responseData.language;
          
          // フレーズ表示領域
          const safePhrase = responseData.phrase.replace(/'/g, "\\'").replace(/"/g, '&quot;');
          html += `<div class="flex items-center gap-2">
                     <span class="text-xs font-bold text-gray-400">📝 保存フレーズ:</span>
                     <span class="text-sm font-medium text-blue-700">${responseData.phrase}</span>
                     <button onclick="playAudio('${safePhrase}', '${lang}')" class="p-1 text-blue-500 hover:bg-blue-100 rounded-full transition duration-200" title="フレーズを発音">🔊</button>
                   </div>`;
          
          // 例文表示領域
          if (responseData.examples && responseData.examples.length > 0) {
              html += `<div class="text-xs font-bold text-gray-400 mt-1">📚 保存された例文:</div>`;
              responseData.examples.forEach((ex, idx) => {
                  let foreignText = ex;
                  if (ex.includes(' - ')) {
                      foreignText = ex.split(' - ')[0];
                  } else if (ex.includes('（')) {
                      foreignText = ex.split('（')[0];
                  }
                  
                  const safeEx = foreignText.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                  html += `<div class="flex items-start gap-2 bg-gray-50 p-2.5 rounded-lg border border-gray-100 text-sm">
                             <button onclick="playAudio('${safeEx}', '${lang}')" class="shrink-0 text-green-600 hover:text-green-800 transition duration-200 mt-0.5" title="例文${idx + 1}を発音">🔊</button>
                             <span class="text-gray-700 leading-relaxed">${ex}</span>
                           </div>`;
              });
          }
          html += `</div>`;
      }

      html += `</div>`;
      msgDiv.innerHTML = html;
      chatContent.appendChild(msgDiv);
      scrollToBottom();
    }

    function appendLoading() {
      const chatContent = document.getElementById('chatContent');
      const msgDiv = document.createElement('div');
      msgDiv.id = 'loadingIndicator';
      msgDiv.className = 'flex items-start gap-4';
      msgDiv.innerHTML = `<div class="bg-white border rounded-2xl p-4 shadow-sm text-gray-800 flex items-center gap-2"><div class="loader"></div><span>考え中...</span></div>`;
      chatContent.appendChild(msgDiv);
      scrollToBottom();
    }

    function removeLoading() {
      const loading = document.getElementById('loadingIndicator');
      if (loading) {
        loading.remove();
      }
    }

    function scrollToBottom() {
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      const sendBtn = document.getElementById('sendButton');
      const targetLang = document.getElementById('targetLanguage').value || "自動判定";
      const modelName = document.getElementById('modelSelect').value || "gemini-2.5-flash-lite";

      if (!text) return;

      closeError();
      appendUserMessage(text);
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.classList.add('opacity-50');

      appendLoading();

      // バックエンド呼び出し (.withSuccessHandler と .withFailureHandler を必ず実装)
      google.script.run
        .withSuccessHandler(function(response) {
          removeLoading();
          input.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove('opacity-50');
          input.focus();
          
          if (response && response.reply_message) {
            appendAiMessage(response);
          } else {
            showError('無効なレスポンスを受け取りました。');
          }
        })
        .withFailureHandler(function(error) {
          removeLoading();
          input.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove('opacity-50');
          
          showError(error.message || '通信エラーが発生しました。');
        })
        .processChat(text, targetLang, modelName);
    }

    // --- 音声読み上げ (Text-to-Speech) ロジック ---
    let availableVoices = [];
    if ('speechSynthesis' in window) {
        // 初回ロードで取れる分
        availableVoices = window.speechSynthesis.getVoices();
        // 遅延でロードされたタイミングでキャッシュ
        window.speechSynthesis.onvoiceschanged = function() {
            availableVoices = window.speechSynthesis.getVoices();
        };
    }

    const ttsLangCodeMap = {
      "英語": "en-US",
      "中国語": "zh-CN",
      "韓国語": "ko-KR",
      "スペイン語": "es-ES",
      "フランス語": "fr-FR",
      "アラビア語": "ar-SA"
    };

    function playAudio(text, langName) {
        if (!('speechSynthesis' in window)) {
            showError('お使いのブラウザはTTS（音声読み上げ）に対応していません。');
            return;
        }

        // 現在スピーチ中のものがあればキャンセルして上書き
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        
        // 言語コードのマッピング（見つからなければデフォルトでen-US）
        const langCode = ttsLangCodeMap[langName] || 'en-US';
        utterance.lang = langCode;

        // --- OS/ブラウザにインストールされている音声エンジンを明示的に割り当てる ---
        // Chromeの非同期ロード対策としてキャッシュがあればそれを利用
        let voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) voices = availableVoices;

        if (voices.length > 0) {
            const baseLang = langCode.split('-')[0]; // 例: 'ar'
            
            // 1. 完全一致 (ar-SA) → 2. アンダースコア表記 (ar_SA) → 3. 前方一致 (ar-AEなど) の順で探す
            const targetVoice = voices.find(v => v.lang.replace('_', '-') === langCode) || 
                                voices.find(v => v.lang.startsWith(baseLang));
            
            if (targetVoice) {
                utterance.voice = targetVoice;
            } else {
                // 声が見つからない場合はエラーを出す
                showError(`「${langName}」の音声がOSにインストールされていません。<br>
                Google Apps Scriptの制限によりChrome専用のクラウド音声がブロックされてしまうため、<b>Windowsの「設定＞時刻と言語＞音声認識」からアラビア語の音声パックを直接インストール</b>してください。`);
                return;
            }
        } else {
             // まだロード中か完全にブロックされている場合
             showError('音声機能のロード中です。数秒待ってからもう一度お試しください。');
             return;
        }

        window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
